<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Priya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Gaegu:wght@400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Caveat',cursive;
  background:#09050b;
  color:#fff;
  overflow-x:hidden;
}

/* background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('assets/images/bg.jpg') center/cover no-repeat;
  filter:blur(16px) brightness(.5);
  z-index:-1;
}

/* layout */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}

/* card */
.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  border-radius:30px;
  padding:30px 20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* text */
h1{
  font-family:'Gaegu',cursive;
  font-size:38px;
  margin-bottom:10px;
}
.name{
  font-family:'Pacifico',cursive;
  font-size:48px;
  color:#ff79b6;
}
p{
  font-size:16px;
  opacity:.85;
}

/* button */
.btn{
  margin-top:25px;
  padding:15px;
  border:none;
  border-radius:50px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#ff4d6d,#ff9a8b);
  color:#fff;
  box-shadow:0 10px 30px rgba(255,80,120,.5);
}

/* cake */
.cake{
  margin:40px auto 20px;
  width:180px;
  height:200px;
  position:relative;
}

.layer{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  height:40px;
  border-radius:15px;
  background:linear-gradient(#ff6fae,#ff9cc8);
  animation:drop .7s ease forwards;
  opacity:0;
}
.layer2{width:160px;bottom:50px;animation-delay:.3s}
.layer3{width:180px;bottom:10px;animation-delay:.6s}
.layer1{bottom:90px;animation-delay:.1s}

.candle{
  position:absolute;
  left:50%;
  bottom:140px;
  width:10px;
  height:40px;
  background:#fff;
  transform:translateX(-50%);
  animation:fadeIn .5s ease forwards;
  animation-delay:1s;
  opacity:0;
}
.flame{
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  height:18px;
  background:orange;
  border-radius:50%;
  animation:flicker .2s infinite alternate;
}

/* animations */
@keyframes drop{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
@keyframes fadeIn{
  to{opacity:1}
}
@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.2)}
}
  /* === NEW CAKE === */
.cake-wrap{
  margin-top:40px;
  display:flex;
  justify-content:center;
}

.cake{
  position:relative;
  width:200px;
  height:220px;
}

.layer{
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.8);
  height:50px;
  border-radius:25px;
  opacity:0;
  animation:pop 0.6s ease forwards;
}

.l1{
  width:140px;
  bottom:120px;
  background:linear-gradient(#ff8fc7,#ffb3d9);
  animation-delay:0.2s;
}
.l2{
  width:170px;
  bottom:70px;
  background:linear-gradient(#ff7ab8,#ff9cc8);
  animation-delay:0.4s;
}
.l3{
  width:200px;
  bottom:20px;
  background:linear-gradient(#ff5fa5,#ff85bc);
  animation-delay:0.6s;
}

.candle{
  position:absolute;
  left:50%;
  bottom:170px;
  width:12px;
  height:45px;
  background:#fff;
  border-radius:6px;
  transform:translateX(-50%);
  opacity:0;
  animation:fade 0.5s ease forwards 0.9s;
}

.flame{
  position:absolute;
  top:-18px;
  left:50%;
  width:14px;
  height:20px;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ff9d00,#ff4d6d);
  box-shadow:0 0 12px #ff9d00,0 0 25px #ff4d6d;
  animation:flicker 0.2s infinite alternate;
}

@keyframes pop{
  from{
    transform:translateX(-50%) scale(0.5) translateY(-30px);
    opacity:0;
  }
  to{
    transform:translateX(-50%) scale(1) translateY(0);
    opacity:1;
  }
}

@keyframes fade{
  to{opacity:1;}
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1);}
  to{transform:translateX(-50%) scale(1.2);}
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>For Someone Special</h1>
    <div class="name">Priya ❤️</div>

    <p>I made something for you… just open it.</p>

    <button class="btn" onclick="showCake()">Open</button>

  <div id="cakeBox" style="display:none">

  <div class="cake-wrap">
    <div class="cake">
      <div class="layer l1"></div>
      <div class="layer l2"></div>
      <div class="layer l3"></div>

      <div class="candle">
        <div class="flame"></div>
      </div>
    </div>
  </div>

  <a href="surprise.html">
    <button class="btn">See Surprise ❤️</button>
  </a>

</div>

  </div>

</div>

<script>
function showCake(){
  document.getElementById("cakeBox").style.display="block";
}
</script>

</body>
</html>
