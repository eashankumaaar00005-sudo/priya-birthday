<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Priya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Gaegu:wght@400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Caveat',cursive;
  background:#09050b;
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('assets/images/bg.jpg') center/cover no-repeat;
  filter:blur(16px) brightness(.48);
  transform:scale(1.04);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 35%,rgba(255,110,170,.22),transparent 34%),
    linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.42));
  z-index:-1;
  pointer-events:none;
}

.container{
  max-width:430px;
  margin:auto;
  padding:20px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.card{
  width:100%;
  min-height:620px;
  background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.045));
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(18px);
  border-radius:34px;
  padding:34px 22px;
  box-shadow:
    0 28px 90px rgba(0,0,0,.65),
    0 0 70px rgba(255,90,155,.18),
    inset 0 1px 0 rgba(255,255,255,.22);
}

h1{
  font-family:'Gaegu',cursive;
  font-size:40px;
  line-height:1.05;
  margin-bottom:10px;
  letter-spacing:1px;
}

.name{
  font-family:'Pacifico',cursive;
  font-size:54px;
  line-height:1.1;
  color:#ff79b6;
  text-shadow:0 0 28px rgba(255,100,175,.45);
}

p{
  font-size:17px;
  opacity:.9;
  margin-top:8px;
}

.btn{
  margin-top:24px;
  padding:14px 24px;
  border:none;
  border-radius:999px;
  font-size:19px;
  font-weight:700;
  cursor:pointer;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ff4d6d,#ff9a8b);
  color:#fff;
  box-shadow:0 13px 35px rgba(255,80,120,.48);
  transition:.25s ease;
}

.btn:active{
  transform:scale(.96);
}

#cakeBox{
  margin-top:28px;
}

.cake-shell{
  position:relative;
  width:min(310px,92vw);
  margin:0 auto;
  animation:cakeFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 20px 35px rgba(255,70,145,.22));
}

@keyframes cakeFloat{
  0%,100%{transform:translateY(0) rotate(-.3deg)}
  50%{transform:translateY(-10px) rotate(.3deg)}
}

.cake-svg{
  width:100%;
  display:block;
  overflow:visible;
}

.drip{
  transform-origin:top center;
  animation:dripIn .75s ease both;
}

.drip.mid{animation-delay:.15s}
.drip.bot{animation-delay:.3s}

@keyframes dripIn{
  from{transform:scaleY(0);opacity:0}
  to{transform:scaleY(1);opacity:1}
}

.pearl{
  transform-origin:center;
  animation:pearlPop .55s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes pearlPop{
  from{transform:scale(0);opacity:0}
  to{transform:scale(1);opacity:1}
}

.candle-g{
  transform-origin:center bottom;
  animation:candleRise .65s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes candleRise{
  from{transform:translateY(20px) scaleY(.55);opacity:0}
  to{transform:translateY(0) scaleY(1);opacity:1}
}

.flame{
  transform-box:fill-box;
  transform-origin:center center;
  animation:flameGlow .75s ease-in-out infinite alternate;
}

@keyframes flameGlow{
  0%{
    opacity:.82;
    filter:drop-shadow(0 0 4px rgba(255,180,0,.75));
  }
  100%{
    opacity:1;
    filter:drop-shadow(0 0 10px rgba(255,110,0,.95));
  }
}

.blow-btn{
  margin-top:10px;
  padding:11px 19px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#ff5fa5,#ff8b6f);
  color:#fff;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(255,80,150,.35);
}

.action-row{
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  margin-top:8px;
}

a{
  text-decoration:none;
}

.sparkle{
  position:absolute;
  pointer-events:none;
  animation:sparkleFly .9s ease-out forwards;
  font-size:18px;
}

@keyframes sparkleFly{
  from{opacity:1;transform:translate(0,0) scale(.6) rotate(0deg)}
  to{opacity:0;transform:translate(var(--x),var(--y)) scale(1.3) rotate(180deg)}
}

.smoke{
  opacity:0;
  animation:smokeRise 1.3s ease-out forwards;
}

@keyframes smokeRise{
  0%{opacity:0;transform:translateY(0) scale(.6)}
  25%{opacity:.65}
  100%{opacity:0;transform:translateY(-40px) scale(2)}
}

@media(max-width:390px){
  .card{min-height:590px;padding:28px 18px}
  h1{font-size:36px}
  .name{font-size:48px}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>For Someone Special</h1>
    <div class="name">Priya ❤️</div>
    <p>I made something for you… just open it.</p>

    <button class="btn" onclick="showCake()">Open</button>

    <div id="cakeBox" style="display:none;">

      <div class="cake-shell" id="cakeShell">

        <svg class="cake-svg" viewBox="0 0 460 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Premium animated birthday cake">

          <defs>
            <linearGradient id="cakeBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffc277"/>
              <stop offset="100%" stop-color="#e89b43"/>
            </linearGradient>

            <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff8cc4"/>
              <stop offset="100%" stop-color="#e83f92"/>
            </linearGradient>

            <linearGradient id="plate" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#ffd6eb"/>
              <stop offset="50%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#ffd6eb"/>
            </linearGradient>

            <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <ellipse cx="230" cy="450" rx="178" ry="18" fill="url(#plate)" opacity=".68"/>

          <!-- Bottom tier -->
          <rect x="75" y="355" width="310" height="82" rx="16" fill="url(#cakeBody)"/>
          <rect x="75" y="332" width="310" height="34" rx="14" fill="url(#frost)"/>
          <path class="drip bot" d="M75 360 C95 395,115 360,130 360 C150 410,180 360,200 360 C225 405,250 360,270 360 C292 398,315 360,335 360 C350 392,370 360,385 360 L385 366 L75 366 Z" fill="url(#frost)"/>
          <g>
            <circle class="pearl" cx="115" cy="346" r="7" fill="#ffd1e5"/>
            <circle class="pearl" cx="160" cy="346" r="7" fill="#ffd1e5"/>
            <circle class="pearl" cx="205" cy="346" r="7" fill="#ffd1e5"/>
            <circle class="pearl" cx="250" cy="346" r="7" fill="#ffd1e5"/>
            <circle class="pearl" cx="295" cy="346" r="7" fill="#ffd1e5"/>
            <circle class="pearl" cx="340" cy="346" r="7" fill="#ffd1e5"/>
          </g>

          <!-- Middle tier -->
          <rect x="120" y="270" width="220" height="76" rx="15" fill="url(#cakeBody)"/>
          <rect x="120" y="248" width="220" height="32" rx="13" fill="url(#frost)"/>
          <path class="drip mid" d="M120 275 C138 310,155 275,170 275 C188 318,210 275,228 275 C248 312,270 275,288 275 C305 305,323 275,340 275 L340 281 L120 281 Z" fill="url(#frost)"/>
          <g>
            <circle class="pearl" cx="150" cy="262" r="6" fill="#ffd1e5"/>
            <circle class="pearl" cx="190" cy="262" r="6" fill="#ffd1e5"/>
            <circle class="pearl" cx="230" cy="262" r="6" fill="#ffd1e5"/>
            <circle class="pearl" cx="270" cy="262" r="6" fill="#ffd1e5"/>
            <circle class="pearl" cx="310" cy="262" r="6" fill="#ffd1e5"/>
          </g>

          <!-- Top tier -->
          <rect x="170" y="196" width="120" height="62" rx="14" fill="url(#cakeBody)"/>
          <rect x="170" y="176" width="120" height="30" rx="12" fill="url(#frost)"/>
          <path class="drip" d="M170 202 C180 232,195 202,205 202 C217 238,235 202,248 202 C260 230,276 202,290 202 L290 208 L170 208 Z" fill="url(#frost)"/>
          <g>
            <circle class="pearl" cx="190" cy="188" r="5.5" fill="#ffd1e5"/>
            <circle class="pearl" cx="210" cy="188" r="5.5" fill="#ffd1e5"/>
            <circle class="pearl" cx="230" cy="188" r="5.5" fill="#ffd1e5"/>
            <circle class="pearl" cx="250" cy="188" r="5.5" fill="#ffd1e5"/>
            <circle class="pearl" cx="270" cy="188" r="5.5" fill="#ffd1e5"/>
          </g>

          <!-- Candles -->
          <g id="flameGroup">
            <g class="candle-g" style="animation-delay:.05s">
              <rect x="202" y="128" width="12" height="50" rx="4" fill="#ff4d6d"/>
              <rect x="202" y="140" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <rect x="202" y="154" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <ellipse class="flame" cx="208" cy="116" rx="8" ry="14" fill="#ffc400"/>
              <ellipse class="flame" cx="208" cy="120" rx="4" ry="8" fill="#ff6a00"/>
            </g>

            <g class="candle-g" style="animation-delay:.15s">
              <rect x="224" y="128" width="12" height="50" rx="4" fill="#5ad7cc"/>
              <rect x="224" y="140" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <rect x="224" y="154" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <ellipse class="flame" cx="230" cy="116" rx="8" ry="14" fill="#ffc400" filter="url(#glow)"/>
              <ellipse class="flame" cx="230" cy="120" rx="4" ry="8" fill="#ff6a00"/>
            </g>

            <g class="candle-g" style="animation-delay:.25s">
              <rect x="246" y="128" width="12" height="50" rx="4" fill="#9b5de5"/>
              <rect x="246" y="140" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <rect x="246" y="154" width="12" height="5" rx="2" fill="#fff" opacity=".75"/>
              <ellipse class="flame" cx="252" cy="116" rx="8" ry="14" fill="#ffc400" filter="url(#glow)"/>
              <ellipse class="flame" cx="252" cy="120" rx="4" ry="8" fill="#ff6a00"/>
            </g>
          </g>

          <g id="smokeGroup" style="display:none;">
            <circle class="smoke" cx="208" cy="116" r="6" fill="#ddd"/>
            <circle class="smoke" cx="230" cy="116" r="6" fill="#ddd"/>
            <circle class="smoke" cx="252" cy="116" r="6" fill="#ddd"/>
          </g>

        </svg>

      </div>

      <div class="action-row">
        <button class="blow-btn" onclick="blowCandles()">💨 Blow Candles</button>
        <a href="surprise.html">
          <button class="btn" style="margin-top:0;">See Surprise ❤️</button>
        </a>
      </div>

    </div>

  </div>
</div>

<script>
let blown = false;

function showCake(){
  document.getElementById("cakeBox").style.display = "block";
}

function blowCandles(){
  const flameGroup = document.getElementById("flameGroup");
  const smokeGroup = document.getElementById("smokeGroup");
  const shell = document.getElementById("cakeShell");

  if(!blown){
    flameGroup.style.display = "none";
    smokeGroup.style.display = "block";
    blown = true;
    sparkle(shell);
  }else{
    flameGroup.style.display = "block";
    smokeGroup.style.display = "none";
    blown = false;
  }
}

function sparkle(parent){
  for(let i=0;i<14;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.innerText = ["✨","⭐","💫","🌟"][Math.floor(Math.random()*4)];
    s.style.left = (35 + Math.random()*30) + "%";
    s.style.top = (30 + Math.random()*35) + "%";
    s.style.setProperty("--x", ((Math.random()-.5)*180) + "px");
    s.style.setProperty("--y", (-(60 + Math.random()*130)) + "px");
    parent.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}
</script>

</body>
</html>
