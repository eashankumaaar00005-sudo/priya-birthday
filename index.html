<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priya 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background:linear-gradient(#feecea,#feecea);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
}

/* ===== HERO ===== */
.wrapper{
  width:100%;
  max-width:420px;
  text-align:center;
  padding:40px 20px;
  transition:.6s;
}

.top-text{
  font-size:12px;
  letter-spacing:1.5px;
  color:#FF7882;
}

.name{
  font-family:'Dancing Script',cursive;
  font-size:52px;
  background: linear-gradient(180deg,#ff9aa2,#ff4d6d,#c9184a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:6px 0;
}

.sub{
  font-size:13px;
  color:#555;
  margin-bottom:18px;
}

/* ===== BUTTON ===== */
.btn{
  padding:10px 24px;
  border-radius:50px;
  border:none;
  background:linear-gradient(135deg,#FF7882,#c9184a);
  color:#fff;
  font-size:14px;
  font-weight:600;
  box-shadow:0 10px 25px rgba(255,120,130,.3);
  cursor:pointer;
  transition:.25s;
}

.btn:active{
  transform:scale(.92);
}

/* ===== CAKE ===== */
.cake-wrap{
  margin-top:25px;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.cake{
  width:200px;
  height:120px;
  background:linear-gradient(#fff4f9,#f8d8ea);
  border-radius:20px;
  position:relative;
  margin:auto;
}

.cake::before{
  content:'';
  position:absolute;
  top:-12px;
  width:100%;
  height:24px;
  border-radius:50%;
  background:#fff0f6;
}

/* drip */
.drip{
  position:absolute;
  top:0;
  width:100%;
  height:40px;
  background:#ff6fa5;
  border-radius:20px;
  clip-path:polygon(
    0 0,100% 0,100% 60%,
    90% 80%,80% 60%,70% 80%,60% 60%,
    50% 80%,40% 60%,30% 80%,20% 60%,10% 80%,0 60%
  );
}

/* candle */
.candle{
  position:absolute;
  top:-35px;
  left:50%;
  transform:translateX(-50%);
  width:6px;
  height:30px;
  background:#fff;
  border-radius:3px;
}

.flame{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  width:8px;
  height:14px;
  background:radial-gradient(circle,#ffd166,#ff6b6b);
  border-radius:50%;
  animation:flicker .7s infinite alternate;
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.25)}
}

/* ===== OVERLAY LETTER ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.5s;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  width:85%;
  max-width:300px;
  background:#fff8e4;
  border-radius:18px;
  padding:20px;
  text-align:center;
  transform:scale(.7);
  transition:.4s;
}

.overlay.active .card{
  transform:scale(1);
}

.card h2{
  font-family:'Dancing Script',cursive;
  color:#c9184a;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  color:#333;
}

/* ===== BLUR BACKGROUND ===== */
.blur{
  filter:blur(6px);
  transform:scale(.96);
}

</style>
</head>

<body>

<div class="wrapper" id="main">

  <div class="top-text">For Someone Very Special 💖</div>
  <div class="name">Priya</div>
  <div class="sub">A little surprise made just for you ✨</div>

  <button class="btn" onclick="openCard()">Tap to Open 💌</button>

  <div class="cake-wrap">
    <div class="cake">
      <div class="drip"></div>
      <div class="candle">
        <div class="flame" id="flame"></div>
      </div>
    </div>
  </div>

</div>

<!-- MESSAGE -->
<div class="overlay" id="overlay">
  <div class="card">
    <h2>For You 💖</h2>
    <p>
      You are something truly special.  
      I hope today brings you happiness, smiles, and everything you deserve ✨
    </p>
  </div>
</div>

<script>
function openCard(){
  document.getElementById('overlay').classList.add('active');
  document.getElementById('main').classList.add('blur');

  // candle off effect
  document.getElementById('flame').style.opacity = "0";
}
</script>

</body>
</html>
