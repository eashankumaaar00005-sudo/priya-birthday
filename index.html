<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priya 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background: linear-gradient(#feecea,#feecea);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Nunito',sans-serif;
}

/* ===== HERO ===== */
.wrapper{
  width:100%;
  max-width:420px;
  text-align:center;
  padding:40px 20px;
}

.top-text{
  font-size:12px;
  letter-spacing:1.5px;
  color:#FF7882;
  margin-bottom:6px;
}

.name{
  font-family:'Dancing Script',cursive;
  font-size:48px;
  background: linear-gradient(180deg,#ff9aa2,#ff4d6d,#c9184a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}

.sub{
  font-size:13px;
  color:#555;
  margin-bottom:18px;
}

/* ===== BUTTON ===== */
.btn{
  padding:10px 22px;
  border-radius:50px;
  border:none;
  background:linear-gradient(135deg,#FF7882,#c9184a);
  color:#fff;
  font-size:14px;
  font-weight:600;
  box-shadow:0 10px 25px rgba(255,120,130,.3);
  cursor:pointer;
  transition:.2s;
  margin-bottom:22px;
}

.btn:active{
  transform:scale(.95);
}

/* ===== CAKE FLOAT ===== */
.cake-wrap{
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* ===== CANDLE ===== */
.candle{
  position:absolute;
  top:-35px;
  left:50%;
  transform:translateX(-50%);
  width:6px;
  height:30px;
  background:#fff;
  border-radius:3px;
}

.flame{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  width:8px;
  height:14px;
  background:radial-gradient(circle,#ffd166,#ff6b6b);
  border-radius:50%;
  animation:flicker .7s infinite alternate;
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.2)}
}

/* ===== CAKE ===== */
.cake{
  width:200px;
  height:120px;
  background:linear-gradient(#fff4f9,#f8d8ea);
  border-radius:20px;
  position:relative;
  margin:auto;
}

.cake::before{
  content:'';
  position:absolute;
  top:-12px;
  left:0;
  width:100%;
  height:24px;
  border-radius:50%;
  background:#fff0f6;
}

/* drip */
.drip{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:40px;
  background:#ff6fa5;
  border-radius:20px;
  clip-path:polygon(
    0 0,100% 0,100% 60%,
    95% 80%,90% 60%,85% 80%,80% 60%,
    75% 80%,70% 60%,65% 80%,60% 60%,
    55% 80%,50% 60%,45% 80%,40% 60%,
    35% 80%,30% 60%,25% 80%,20% 60%,
    15% 80%,10% 60%,5% 80%,0 60%
  );
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="top-text">For Someone Very Special 💖</div>

  <div class="name">Priya</div>

  <div class="sub">A little surprise made just for you ✨</div>

  <button class="btn">Tap to Open 💌</button>

  <div class="cake-wrap">

    <div class="cake">
      <div class="drip"></div>

      <div class="candle">
        <div class="flame"></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
