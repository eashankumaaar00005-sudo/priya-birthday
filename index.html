<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Priya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Gaegu:wght@400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Caveat',cursive;
  background:#09050b;
  color:#fff;
  overflow-x:hidden;
}

/* background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('assets/images/bg.jpg') center/cover no-repeat;
  filter:blur(16px) brightness(.5);
  z-index:-1;
}

/* layout */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}

/* card */
.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  border-radius:30px;
  padding:30px 20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* text */
h1{
  font-family:'Gaegu',cursive;
  font-size:38px;
  margin-bottom:10px;
}
.name{
  font-family:'Pacifico',cursive;
  font-size:48px;
  color:#ff79b6;
}
p{
  font-size:16px;
  opacity:.85;
}

/* button */
.btn{
  margin-top:25px;
  padding:15px;
  border:none;
  border-radius:50px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#ff4d6d,#ff9a8b);
  color:#fff;
  box-shadow:0 10px 30px rgba(255,80,120,.5);
}

/* cake */
.cake{
  margin:40px auto 20px;
  width:180px;
  height:200px;
  position:relative;
}

.layer{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  height:40px;
  border-radius:15px;
  background:linear-gradient(#ff6fae,#ff9cc8);
  animation:drop .7s ease forwards;
  opacity:0;
}
.layer2{width:160px;bottom:50px;animation-delay:.3s}
.layer3{width:180px;bottom:10px;animation-delay:.6s}
.layer1{bottom:90px;animation-delay:.1s}

.candle{
  position:absolute;
  left:50%;
  bottom:140px;
  width:10px;
  height:40px;
  background:#fff;
  transform:translateX(-50%);
  animation:fadeIn .5s ease forwards;
  animation-delay:1s;
  opacity:0;
}
.flame{
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  height:18px;
  background:orange;
  border-radius:50%;
  animation:flicker .2s infinite alternate;
}

/* animations */
@keyframes drop{
  from{transform:translateX(-50%) translateY(-60px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
@keyframes fadeIn{
  to{opacity:1}
}
@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.2)}
}
  /* === NEW CAKE === */
.cake-wrap{
  margin-top:40px;
  display:flex;
  justify-content:center;
}

.cake{
  position:relative;
  width:200px;
  height:220px;
}

.layer{
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.8);
  height:50px;
  border-radius:25px;
  opacity:0;
  animation:pop 0.6s ease forwards;
}

.l1{
  width:140px;
  bottom:120px;
  background:linear-gradient(#ff8fc7,#ffb3d9);
  animation-delay:0.2s;
}
.l2{
  width:170px;
  bottom:70px;
  background:linear-gradient(#ff7ab8,#ff9cc8);
  animation-delay:0.4s;
}
.l3{
  width:200px;
  bottom:20px;
  background:linear-gradient(#ff5fa5,#ff85bc);
  animation-delay:0.6s;
}

.candle{
  position:absolute;
  left:50%;
  bottom:170px;
  width:12px;
  height:45px;
  background:#fff;
  border-radius:6px;
  transform:translateX(-50%);
  opacity:0;
  animation:fade 0.5s ease forwards 0.9s;
}

.flame{
  position:absolute;
  top:-18px;
  left:50%;
  width:14px;
  height:20px;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ff9d00,#ff4d6d);
  box-shadow:0 0 12px #ff9d00,0 0 25px #ff4d6d;
  animation:flicker 0.2s infinite alternate;
}

@keyframes pop{
  from{
    transform:translateX(-50%) scale(0.5) translateY(-30px);
    opacity:0;
  }
  to{
    transform:translateX(-50%) scale(1) translateY(0);
    opacity:1;
  }
}

@keyframes fade{
  to{opacity:1;}
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1);}
  to{transform:translateX(-50%) scale(1.2);}
}
  /* === PREMIUM INTERACTIVE CAKE === */

.scene{
  text-align:center;
  margin-top:30px;
}

.cake-wrapper{
  position:relative;
  width:200px;
  height:220px;
  margin:auto;
  animation:floatCake 4s ease-in-out infinite;
}

@keyframes floatCake{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* tiers */
.tier{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:50px;
  border-radius:20px;
  background:linear-gradient(#ff7ab8,#ff4d9d);
}

.top{width:110px; bottom:130px;}
.mid{width:150px; bottom:80px;}
.bottom{width:190px; bottom:30px;}

/* drips */
.drip{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:20px;
  background:#ff9cc8;
  border-radius:50%;
}
.drip-top{width:110px; bottom:150px;}
.drip-mid{width:150px; bottom:100px;}
.drip-bot{width:190px; bottom:50px;}

/* candles */
.candles{
  position:absolute;
  bottom:180px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.candle{
  width:10px;
  height:35px;
  background:repeating-linear-gradient(
    45deg,#fff,#fff 5px,#ff4d9d 5px,#ff4d9d 10px
  );
  border-radius:5px;
  position:relative;
}

/* flame */
.flame{
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  height:16px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ffb300,#ff4d6d);
  box-shadow:0 0 10px #ffb300,0 0 20px #ff4d6d;
  animation:flicker .2s infinite alternate;
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1);}
  to{transform:translateX(-50%) scale(1.2);}
}

/* blow button */
.blow-btn{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#ff4d9d;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>For Someone Special</h1>
    <div class="name">Priya ❤️</div>

    <p>I made something for you… just open it.</p>

    <button class="btn" onclick="showCake()">Open</button>

<div id="cakeBox" style="display:none">

  <div class="scene">

    <div id="cake" class="cake-wrapper">

      <!-- TOP -->
      <div class="tier top"></div>
      <div class="drip drip-top"></div>

      <!-- MID -->
      <div class="tier mid"></div>
      <div class="drip drip-mid"></div>

      <!-- BOTTOM -->
      <div class="tier bottom"></div>
      <div class="drip drip-bot"></div>

      <!-- CANDLES -->
      <div class="candles">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
      </div>

    </div> <!-- cake -->

    <!-- BUTTON -->
    <button class="blow-btn" onclick="blowCandles()">💨 Blow Candles</button>

    <!-- NEXT -->
    <a href="surprise.html">
      <button class="btn">See Surprise ❤️</button>
    </a>

  </div> <!-- scene -->

</div> <!-- cakeBox -->

<script>
function showCake(){
  document.getElementById("cakeBox").style.display="block";
}
  function blowCandles(){
  const flames = document.querySelectorAll(".flame");

  flames.forEach(f => {
    f.style.display = "none";

    const smoke = document.createElement("div");
    smoke.innerText = "💨";
    smoke.style.position = "absolute";
    smoke.style.top = "-10px";
    smoke.style.left = "50%";
    smoke.style.transform = "translateX(-50%)";
    f.parentElement.appendChild(smoke);

    setTimeout(()=> smoke.remove(), 1000);
  });
}
</script>

</body>
</html>
